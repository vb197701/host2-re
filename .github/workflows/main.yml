name: Host2Play Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "21 5,11,17,23 * * *"

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Checkout Private Script
        uses: actions/checkout@v4
        with:
          # 需在 Secrets 中配置 PRIVATE_REPO_NAME (如: username/Host2Play-Renew-Private)
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private_script

      - name: Setup WARP Proxy
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect

          echo "⏳ 等待 WARP 隧道建立 (10秒)..."
          sleep 10

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Packages
        run: |
          pip install seleniumbase SpeechRecognition
          sbase install chromium

      - name: Run Script
        env:
          # 这里的变量名与 python 中的 os.getenv 严格一一对应
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: "socks5://127.0.0.1:40000"
        run: |
          mkdir -p screenshots

          echo "🌍 验证 WARP SOCKS5 代理 IP:"
          curl -s -x socks5://127.0.0.1:40000 https://api.ipify.org || echo "⚠️ IP获取失败"
          echo ""

          # 使用 xvfb-run 虚拟桌面运行私有仓库拉取下来的 python 脚本
          xvfb-run -a python private_script/renew.py

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: screenshots/**
          if-no-files-found: ignore

      - name: KeepAlive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "最后运行时间: $(date)" > time.txt
          git add time.txt
          if git diff --staged --quiet; then
            echo "没有内容变化，跳过推送。"
          else
            git commit -m "⏰ KeepAlive: $(date +'%Y-%m-%d %H:%M UTC')"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:main --force
          fi
