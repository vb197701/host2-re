name: Auto Renew Server Script yescaptcha

on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 5:21 / 11:21 / 17:21 / 23:21，间隔约 6 小时
    - cron: "21 5,11,17,23 * * *"

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      # ── 1. Checkout 公开仓库（KeepAlive 需要）──────────────────────────────
      - name: Checkout public repo
        uses: actions/checkout@v4

      # ── 2. Checkout 私有脚本仓库 ─────────────────────────────────────────────
      - name: Checkout private repo (Host2Play)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # ── 3. Setup Python 3.11 ─────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. 安装 Python 依赖（极简，无需浏览器）──────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ── 5. 运行续订脚本 ───────────────────────────────────────────────────────
      - name: Run renew script
        working-directory: scripts
        env:
          RENEW_URL:  ${{ secrets.RENEW_URL }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python yescaptcha.py

      # ── 6. 清理旧的 Workflow 运行记录 ─────────────────────────────────────────
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2

      # ── 7. KeepAlive（防止 GitHub 停用定时任务）──────────────────────────────
      - name: KeepAlive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "最后运行时间: $(date)" > time.txt
          git add time.txt
          if git diff --staged --quiet; then
            echo "没有内容变化，跳过推送。"
          else
            git commit -m "⏰ KeepAlive: $(date +'%Y-%m-%d %H:%M UTC')"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:main --force
          fi
