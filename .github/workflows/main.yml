name: Auto Renew Server Script yescaptcha

on:
  workflow_dispatch:
  schedule:
    - cron: "21 5,11,17,23 * * *"

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Cloudflare WARP Proxy
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor \
              --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
            https://pkg.cloudflareclient.com/ jammy main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          echo "⏳ 等待 WARP 隧道建立 (10秒)..."
          sleep 10

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests[socks]

      - name: Run renew script
        working-directory: scripts
        env:
          RENEW_URL:  ${{ secrets.RENEW_URL }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
        run: python yescaptcha.py

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2

      - name: KeepAlive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "最后运行时间: $(date)" > time.txt
          git add time.txt
          if git diff --staged --quiet; then
            echo "没有内容变化，跳过推送。"
          else
            git commit -m "⏰ KeepAlive: $(date +'%Y-%m-%d %H:%M UTC')"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:main --force
          fi
